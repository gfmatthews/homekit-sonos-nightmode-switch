name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      changelog:
        description: "Changelog entries (comma or newline separated)"
        required: true
        type: string
      prerelease:
        description: "Publish as pre-release (appends -beta.N suffix, publishes to beta npm tag)"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write  # Required for npm trusted publishing (OIDC provenance)

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Bump version
        id: bump
        run: |
          npm version ${{ inputs.bump }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            # Append -beta.<timestamp> suffix for uniqueness
            SUFFIX="beta.$(date +%Y%m%d%H%M%S)"
            VERSION="${VERSION}-${SUFFIX}"
            npm version "$VERSION" --no-git-tag-version --allow-same-version
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        env:
          CHANGELOG_INPUT: ${{ inputs.changelog }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          DATE=$(date +%Y-%m-%d)
          # Build the new changelog section
          {
            echo "## [$VERSION] - $DATE"
            echo ""
            echo "$CHANGELOG_INPUT" | tr ',' '\n' | while IFS= read -r line; do
              line=$(echo "$line" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
              [ -z "$line" ] && continue
              # Strip leading "- " or "* " if present, then re-add "- "
              line=$(echo "$line" | sed 's/^[-*][[:space:]]*//')
              echo "- $line"
            done
            echo ""
          } > /tmp/new_section.md
          # Insert after line 3 (after header + description + blank line)
          head -n 3 CHANGELOG.md > /tmp/changelog_new.md
          echo "" >> /tmp/changelog_new.md
          cat /tmp/new_section.md >> /tmp/changelog_new.md
          tail -n +4 CHANGELOG.md >> /tmp/changelog_new.md
          mv /tmp/changelog_new.md CHANGELOG.md

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore: release v${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin HEAD --tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGELOG_INPUT: ${{ inputs.changelog }}
        run: |
          # Build release notes from changelog input
          NOTES=$(echo "$CHANGELOG_INPUT" | tr ',' '\n' | while IFS= read -r line; do
            line=$(echo "$line" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            [ -z "$line" ] && continue
            line=$(echo "$line" | sed 's/^[-*][[:space:]]*//')
            echo "- $line"
          done)
          gh release create "v${{ steps.bump.outputs.version }}" \
            --title "v${{ steps.bump.outputs.version }}" \
            --notes "$NOTES" \
            ${{ inputs.prerelease == true && '--prerelease' || '' }}

      - name: Publish to npm
        run: |
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            npm publish --provenance --access public --tag beta
          else
            npm publish --provenance --access public
          fi
