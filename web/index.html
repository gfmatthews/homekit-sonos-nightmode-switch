<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonos Sound Features — Debug UI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; padding: 2rem; }
    h1 { margin-bottom: 1.5rem; color: #e94560; }
    .controls { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; align-items: center; }
    button { background: #e94560; color: #fff; border: none; padding: 0.6rem 1.2rem; border-radius: 6px; cursor: pointer; font-size: 0.95rem; }
    button:hover { background: #c73a54; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    input[type="text"] { padding: 0.6rem; border-radius: 6px; border: 1px solid #444; background: #16213e; color: #eee; font-size: 0.95rem; width: 200px; }
    .status { background: #16213e; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; color: #aaa; }
    .device-card { background: #16213e; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
    .device-card h3 { color: #e94560; margin-bottom: 0.5rem; }
    .device-card .ip { color: #888; font-size: 0.85rem; margin-bottom: 1rem; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 0; border-top: 1px solid #2a2a4e; }
    .toggle-row:first-of-type { border-top: none; }
    .toggle-label { font-size: 1rem; }
    .switch { position: relative; width: 50px; height: 26px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #444; border-radius: 26px; transition: 0.3s; }
    .slider::before { content: ""; position: absolute; height: 20px; width: 20px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.3s; }
    input:checked + .slider { background: #e94560; }
    input:checked + .slider::before { transform: translateX(24px); }
    .error { color: #ff6b6b; }
  </style>
</head>
<body>
  <h1>Sonos Sound Features — Debug UI</h1>

  <div class="controls">
    <button id="discoverBtn" onclick="discover()">Discover Devices</button>
    <span>or</span>
    <input type="text" id="manualIp" placeholder="192.168.1.100">
    <button onclick="addManualDevice()">Add by IP</button>
  </div>

  <div id="statusMsg" class="status" style="display:none;"></div>
  <div id="devices"></div>

  <script>
    const devicesEl = document.getElementById('devices');
    const statusEl = document.getElementById('statusMsg');

    function showStatus(msg, isError) {
      statusEl.style.display = 'block';
      statusEl.textContent = msg;
      statusEl.className = isError ? 'status error' : 'status';
    }

    async function discover() {
      const btn = document.getElementById('discoverBtn');
      btn.disabled = true;
      btn.textContent = 'Discovering...';
      showStatus('Searching for Sonos devices on the network...', false);
      try {
        const res = await fetch('/api/discover');
        const devices = await res.json();
        if (devices.error) throw new Error(devices.error);
        devicesEl.innerHTML = '';
        if (devices.length === 0) {
          showStatus('No Sonos devices found. Try adding by IP.', true);
        } else {
          statusEl.style.display = 'none';
          for (const d of devices) {
            await addDeviceCard(d.ip, d.name);
          }
        }
      } catch (err) {
        showStatus('Discovery failed: ' + err.message, true);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Discover Devices';
      }
    }

    async function addManualDevice() {
      const ip = document.getElementById('manualIp').value.trim();
      if (!ip) return;
      await addDeviceCard(ip, ip);
      document.getElementById('manualIp').value = '';
    }

    async function addDeviceCard(ip, name) {
      showStatus('Fetching status for ' + ip + '...', false);
      try {
        const res = await fetch('/api/device/' + encodeURIComponent(ip) + '/status');
        const data = await res.json();
        if (data.error) throw new Error(data.error);

        const card = document.createElement('div');
        card.className = 'device-card';
        card.id = 'device-' + ip.replace(/\./g, '-');
        card.innerHTML =
          '<h3>' + escapeHtml(data.name || name) + '</h3>' +
          '<div class="ip">' + escapeHtml(ip) + '</div>' +
          '<div class="toggle-row">' +
            '<span class="toggle-label">Night Mode</span>' +
            '<label class="switch">' +
              '<input type="checkbox" ' + (data.nightMode ? 'checked' : '') +
              ' onchange="toggleFeature(\'' + ip + '\', \'nightmode\', this.checked)">' +
              '<span class="slider"></span>' +
            '</label>' +
          '</div>' +
          '<div class="toggle-row">' +
            '<span class="toggle-label">Speech Enhancement</span>' +
            '<label class="switch">' +
              '<input type="checkbox" ' + (data.speechEnhancement ? 'checked' : '') +
              ' onchange="toggleFeature(\'' + ip + '\', \'speechenhancement\', this.checked)">' +
              '<span class="slider"></span>' +
            '</label>' +
          '</div>';
        devicesEl.appendChild(card);
        statusEl.style.display = 'none';
      } catch (err) {
        showStatus('Failed to get status for ' + ip + ': ' + err.message, true);
      }
    }

    async function toggleFeature(ip, feature, enabled) {
      try {
        const res = await fetch('/api/device/' + encodeURIComponent(ip) + '/' + feature, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ enabled }),
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        showStatus(feature + ' ' + (enabled ? 'enabled' : 'disabled') + ' on ' + ip, false);
      } catch (err) {
        showStatus('Failed to set ' + feature + ': ' + err.message, true);
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
